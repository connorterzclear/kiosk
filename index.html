<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Video Kiosk</title>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@1.5.8"></script>

  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden;
    }
    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
    }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script>
  const video = document.getElementById('video');
  const src = "https://stream.mux.com/Y2001DKbVER7Smp9fqzEkUJ4WO00xnixQ8.m3u8";

  function start() {
    if (window.Hls && Hls.isSupported()) {
      const hls = new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);

      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        video.play();
      });

      // loop fix
      video.addEventListener('ended', () => {
        video.currentTime = 0;
        video.play();
      });

    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
      video.src = src;
      video.addEventListener('loadedmetadata', () => {
        video.play();
      });
    } else {
      document.body.innerHTML = "<h1 style='color:white;text-align:center;margin-top:40vh;'>HLS not supported</h1>";
    }
  }

  window.onload = start;
</script>

</body>
</html>
