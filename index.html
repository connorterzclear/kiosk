<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto-Play Looping Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    .wrapper {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <video
      id="video"
      controls
      autoplay
      muted
      loop
      playsinline
    ></video>
  </div>

  <!-- hls.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById('video');
    const src = 'https://stream.mux.com/Y2001DKbVER7Smp9fqzEkUJ4WO00xnixQ8.m3u8';

    function initPlayer() {
      if (video.canPlayType('application/vnd.apple.mpegurl')) {
        // Safari and some browsers that support HLS natively
        video.src = src;
      } else if (window.Hls && Hls.isSupported()) {
        // Other modern browsers via hls.js
        const hls = new Hls({ autoStartLoad: true });
        hls.loadSource(src);
        hls.attachMedia(video);
      } else {
        // Fallback message
        video.outerHTML = '<p style="color:#fff;text-align:center;">Your browser does not support HLS playback.</p>';
        return;
      }

      // Ensure autoplay (muted is required for many browsers)
      video.addEventListener('loadedmetadata', () => {
        video.play().catch(() => {
          // Autoplay might still be blocked; controls are visible so user can start manually.
        });
      });

      // Extra safety for looping
      video.addEventListener('ended', () => {
        video.currentTime = 0;
        video.play().catch(() => {});
      });
    }

    document.addEventListener('DOMContentLoaded', initPlayer);
  </script>
</body>
</html>
