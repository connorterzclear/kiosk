<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Auto-Play Looping Video</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }
    .wrapper {
      height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }
    mux-player {
      width: 100%;
      height: 100%;
      --controls: auto;
      --media-object-fit: contain;
      background: #000;
    }
  </style>

  <!-- Mux Player (web component) -->
  <script type="module" src="https://cdn.jsdelivr.net/npm/@mux/mux-player"></script>
</head>
<body>
  <div class="wrapper">
    <!--
      playback-id is the ID from URL:
      https://stream.mux.com/Y2001DKbVER7Smp9fqzEkUJ4WO00xnixQ8.m3u8
      -> playback-id="Y2001DKbVER7Smp9fqzEkUJ4WO00xnixQ8"
    -->
    <mux-player
      playback-id="Y2001DKbVER7Smp9fqzEkUJ4WO00xnixQ8"
      autoplay
      loop
      muted
      playsinline
      stream-type="on-demand"
      primary-color="#ffffff"
      secondary-color="#999999"
    >
    </mux-player>
  </div>
</body>
</html>
