<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChromeOS Video Kiosk</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: black;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      background: black;
    }

    #status {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
      background: black;
      font-family: Arial, sans-serif;
      font-size: 20px;
      text-align: center;
      padding: 24px;
    }
  </style>
</head>
<body>
  <video id="player" autoplay loop playsinline>
    <source src="video.mp4" type="video/mp4" />
    Your browser does not support HTML5 video.
  </video>

  <div id="status">
    Video could not start automatically.
  </div>

  <script>
    const video = document.getElementById("player");
    const status = document.getElementById("status");

    async function startVideo() {
      try {
        await video.play();
        status.style.display = "none";
      } catch (err) {
        console.error("Autoplay failed:", err);
        status.style.display = "flex";
      }
    }

    video.addEventListener("error", () => {
      status.textContent = "Video failed to load.";
      status.style.display = "flex";
    });

    document.addEventListener("DOMContentLoaded", startVideo);
    window.addEventListener("load", startVideo);
  </script>
</body>
</html>
